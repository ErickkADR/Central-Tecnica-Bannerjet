<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entrar — Bannerjet Group</title>
  <link rel="shortcut icon" href="images/Group.png" type="image/x-icon">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Sora', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #060209;
      overflow: hidden;
      position: relative;
    }

    /* ── Fundo decorativo ── */
    .login-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
    }
    .login-bg::before {
      content: '';
      position: absolute;
      width: 700px; height: 700px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(242,119,141,0.12) 0%, transparent 70%);
      top: -200px; left: -150px;
    }
    .login-bg::after {
      content: '';
      position: absolute;
      width: 600px; height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(158,99,150,0.1) 0%, transparent 70%);
      bottom: -150px; right: -100px;
    }
    .login-bg-mid {
      position: absolute;
      width: 400px; height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(247,158,119,0.06) 0%, transparent 70%);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
    }

    /* ── Card ── */
    .login-card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 400px;
      margin: 20px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px;
      padding: 44px 40px 40px;
      backdrop-filter: blur(20px);
      box-shadow: 0 24px 64px rgba(0,0,0,0.5);
    }

    /* ── Logo ── */
    .login-logo {
      text-align: center;
      margin-bottom: 28px;
    }
    .login-logo img {
      height: 44px;
      object-fit: contain;
    }

    /* ── Título ── */
    .login-title {
      font-size: 22px;
      font-weight: 800;
      color: #fff;
      text-align: center;
      letter-spacing: -0.03em;
      margin-bottom: 6px;
    }
    .login-sub {
      font-size: 13px;
      color: rgba(255,255,255,0.38);
      text-align: center;
      margin-bottom: 32px;
    }

    /* ── Divisor gradiente ── */
    .login-divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(242,119,141,0.4), rgba(158,99,150,0.4), transparent);
      margin-bottom: 32px;
    }

    /* ── Campos ── */
    .login-field {
      margin-bottom: 16px;
    }
    .login-field label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: rgba(255,255,255,0.5);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 8px;
    }
    .login-field label i { margin-right: 5px; }
    .login-field input {
      width: 100%;
      padding: 13px 16px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      color: #fff;
      font-size: 14px;
      font-family: 'Sora', sans-serif;
      transition: border-color 0.2s, background 0.2s;
      outline: none;
    }
    .login-field input::placeholder { color: rgba(255,255,255,0.22); }
    .login-field input:focus {
      border-color: rgba(242,119,141,0.6);
      background: rgba(255,255,255,0.09);
    }

    /* ── Erro ── */
    .login-error {
      display: none;
      align-items: center;
      gap: 8px;
      background: rgba(239,68,68,0.12);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 13px;
      color: #FCA5A5;
      margin-bottom: 16px;
    }
    .login-error.show { display: flex; }

    /* ── Botão ── */
    .login-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg,#F79E77,#F58979,#F2778D,#9E6396);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      font-family: 'Sora', sans-serif;
      cursor: pointer;
      margin-top: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: opacity 0.2s, transform 0.15s;
    }
    .login-btn:hover { opacity: 0.9; transform: translateY(-1px); }
    .login-btn:active { transform: translateY(0); }

    /* ── Rodapé ── */
    .login-footer {
      text-align: center;
      margin-top: 28px;
      font-size: 11px;
      color: rgba(255,255,255,0.2);
    }
  </style>
</head>
<body>

<div class="login-bg">
  <div class="login-bg-mid"></div>
</div>

<div class="login-card">
  <div class="login-logo">
    <img src="images/Bannerjet-Group-logo-White.png" alt="Bannerjet Group">
  </div>
  <div class="login-title">Central Técnica</div>
  <div class="login-sub">Área de acesso restrito</div>
  <div class="login-divider"></div>

  <form id="login-form">
    <div class="login-field">
      <label for="l-user"><i class="fa-solid fa-user"></i> Usuário</label>
      <input type="text" id="l-user" placeholder="Digite seu usuário" autocomplete="username" autofocus>
    </div>
    <div class="login-field">
      <label for="l-pass"><i class="fa-solid fa-lock"></i> Senha</label>
      <input type="password" id="l-pass" placeholder="Digite sua senha" autocomplete="current-password">
    </div>
    <div class="login-error" id="login-error">
      <i class="fa-solid fa-circle-exclamation"></i> Usuário ou senha incorretos
    </div>
    <button type="submit" class="login-btn">
      <i class="fa-solid fa-right-to-bracket"></i> Entrar
    </button>
  </form>

  <div class="login-footer">© 2025 Bannerjet Group — Central Técnica</div>
</div>

<script>
  const BJ_AUTH_KEY = 'bj-auth-v1';

  // Se já logado, redireciona direto
  if (localStorage.getItem(BJ_AUTH_KEY)) {
    window.location.replace('index.html');
  }

  // ╔══════════════════════════════════════════════╗
  // ║  CREDENCIAIS — altere usuário e senha aqui  ║
  // ╚══════════════════════════════════════════════╝
  const BJ_USERS = [
    { user: 'bannerjet', pass: 'bannerjet2025' }
  ];

  document.getElementById('login-form').addEventListener('submit', function (e) {
    e.preventDefault();
    const user = document.getElementById('l-user').value.trim();
    const pass = document.getElementById('l-pass').value;
    const ok = BJ_USERS.some(u => u.user === user && u.pass === pass);
    if (ok) {
      localStorage.setItem(BJ_AUTH_KEY, btoa(user + ':' + Date.now()));
      window.location.href = 'index.html';
    } else {
      document.getElementById('login-error').classList.add('show');
      document.getElementById('l-pass').value = '';
      document.getElementById('l-pass').focus();
    }
  });

  ['l-user', 'l-pass'].forEach(function (id) {
    document.getElementById(id).addEventListener('input', function () {
      document.getElementById('login-error').classList.remove('show');
    });
  });
</script>
</body>
</html>
